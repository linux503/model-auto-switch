<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 优化模型管理面板</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #06d6a0;
            --warning-color: #ffd166;
            --danger-color: #ef476f;
            --dark-bg: #121826;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid #334155;
        }
        
        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .card-header {
            background-color: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid #334155;
            border-radius: 12px 12px 0 0 !important;
        }
        
        .metric-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--primary-color);
        }
        
        .metric-card.success {
            border-left-color: var(--success-color);
        }
        
        .metric-card.warning {
            border-left-color: var(--warning-color);
        }
        
        .metric-card.danger {
            border-left-color: var(--danger-color);
        }
        
        .score-badge {
            font-size: 0.9rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        
        .score-excellent { background-color: rgba(6, 214, 160, 0.2); color: #06d6a0; }
        .score-good { background-color: rgba(255, 209, 102, 0.2); color: #ffd166; }
        .score-fair { background-color: rgba(239, 71, 111, 0.2); color: #ef476f; }
        
        .trend-up { color: var(--success-color); }
        .trend-down { color: var(--danger-color); }
        .trend-stable { color: var(--warning-color); }
        
        .model-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .model-card.selected {
            border: 2px solid var(--primary-color);
            background-color: rgba(67, 97, 238, 0.1);
        }
        
        .model-card:hover {
            background-color: rgba(67, 97, 238, 0.05);
        }
        
        .progress {
            height: 8px;
            background-color: #334155;
            border-radius: 4px;
        }
        
        .progress-bar {
            border-radius: 4px;
        }
        
        .time-context-badge {
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
        }
        
        .work-hours { background-color: rgba(67, 97, 238, 0.2); color: #4361ee; }
        .evening-peak { background-color: rgba(255, 209, 102, 0.2); color: #ffd166; }
        .off-peak { background-color: rgba(148, 163, 184, 0.2); color: #94a3b8; }
        
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(67, 97, 238, 0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .reason-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.8) 100%);
            border-left: 4px solid var(--primary-color);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        
        .detail-row {
            border-bottom: 1px solid #334155;
            padding: 0.75rem 0;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-cpu-fill me-2"></i>
                <strong>AI 模型智能管理</strong>
            </a>
            
            <div class="d-flex align-items-center">
                <div class="me-3">
                    <span class="badge bg-primary" id="timeContextBadge">工作时间</span>
                </div>
                <button class="btn btn-outline-light btn-sm" onclick="refreshAllData()">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 左侧主面板 -->
            <div class="col-lg-8">
                <!-- 顶部指标卡片 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card metric-card">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">最佳模型</h6>
                                <h4 class="card-title" id="bestModelName">加载中...</h4>
                                <div class="d-flex align-items-center">
                                    <span class="score-badge score-excellent me-2" id="bestModelScore">0.000</span>
                                    <small class="text-muted" id="modelCount">0个模型</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="card metric-card success">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">平均成功率</h6>
                                <h4 class="card-title" id="avgSuccessRate">0%</h4>
                                <div class="progress mt-2">
                                    <div class="progress-bar bg-success" id="successRateBar" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="card metric-card warning">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">平均响应时间</h6>
                                <h4 class="card-title" id="avgResponseTime">0ms</h4>
                                <div class="d-flex align-items-center mt-2">
                                    <i class="bi bi-graph-up trend-up me-1" id="responseTrendIcon"></i>
                                    <small class="text-muted" id="responseTrend">稳定</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-3">
                        <div class="card metric-card">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2 text-muted">系统可用性</h6>
                                <h4 class="card-title" id="systemAvailability">0%</h4>
                                <div class="d-flex align-items-center mt-2">
                                    <i class="bi bi-check-circle-fill text-success me-1"></i>
                                    <small class="text-muted" id="uptimeStatus">运行正常</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 模型评分图表 -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-bar-chart-fill me-2"></i>
                            模型综合评分
                        </h5>
                        <div>
                            <button class="btn btn-sm btn-outline-primary me-2" onclick="toggleChartView()">
                                <i class="bi bi-arrow-left-right"></i> 切换视图
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="exportChartData()">
                                <i class="bi bi-download"></i> 导出
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="modelScoresChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 模型详细列表 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-list-check me-2"></i>
                            模型详细评分
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover">
                                <thead>
                                    <tr>
                                        <th>模型</th>
                                        <th>综合评分</th>
                                        <th>响应时间</th>
                                        <th>成功率</th>
                                        <th>成本效率</th>
                                        <th>稳定性</th>
                                        <th>趋势</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="modelDetailsTable">
                                    <!-- 动态加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧侧边栏 -->
            <div class="col-lg-4">
                <!-- 选择理由 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-lightbulb-fill me-2"></i>
                            AI 选择理由
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="reason-box" id="selectionReason">
                            <div class="loading">
                                <div class="spinner"></div>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <h6>时间上下文:</h6>
                            <div class="d-flex flex-wrap gap-2 mb-3">
                                <span class="time-context-badge work-hours" id="timePeriod">工作时间</span>
                                <span class="badge bg-secondary" id="timePriority">性能优先</span>
                            </div>
                            
                            <h6>权重分配:</h6>
                            <div class="mb-2">
                                <small class="text-muted">响应时间:</small>
                                <div class="progress">
                                    <div class="progress-bar" id="weightResponseTime" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">成功率:</small>
                                <div class="progress">
                                    <div class="progress-bar bg-success" id="weightSuccessRate" style="width: 0%"></div>
                                </div>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">成本效率:</small>
                                <div class="progress">
                                    <div class="progress-bar bg-warning" id="weightCost" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 性能趋势 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-graph-up-arrow me-2"></i>
                            性能趋势预测
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="performanceTrendChart"></canvas>
                        </div>
                        <div class="mt-3" id="trendPredictions">
                            <!-- 动态加载 -->
                        </div>
                    </div>
                </div>

                <!-- 快速操作 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-lightning-fill me-2"></i>
                            快速操作
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="runAIOptimization()">
                                <i class="bi bi-cpu"></i> 运行 AI 优化
                            </button>
                            <button class="btn btn-success" onclick="switchToBestModel()">
                                <i class="bi bi-arrow-right-circle"></i> 切换到最佳模型
                            </button>
                            <button class="btn btn-warning" onclick="testAllModels()">
                                <i class="bi bi-speedometer2"></i> 测试所有模型
                            </button>
                            <button class="btn btn-outline-danger" onclick="showCleanupDialog()">
                                <i class="bi bi-trash"></i> 清理无效模型
                            </button>
                        </div>
                        
                        <div class="mt-3">
                            <h6>定时任务:</h6>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="autoOptimizeSwitch" checked>
                                <label class="form-check-label" for="autoOptimizeSwitch">
                                    自动优化 (每5分钟)
                                </label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="autoTestSwitch">
                                <label class="form-check-label" for="autoTestSwitch">
                                    自动测试 (每小时)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let modelData = null;
        let scoresChart = null;
        let trendChart = null;
        let autoRefreshInterval = null;

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            loadAllData();
            setupAutoRefresh();
        });

        // 加载所有数据
        async function loadAllData() {
            try {
                // 加载AI优化数据
                const response = await fetch('/api/ai-optimization');
                const data = await response.json();
                
                if (data.success) {
                    modelData = data.data;
                    updateDashboard(data.data);
                    updateCharts(data.data);
                } else {
                    showError('加载数据失败: ' + data.error);
                }
            } catch (error) {
                showError('网络错误: ' + error.message);
            }
        }

        // 更新仪表板
        function updateDashboard(data) {
            // 更新最佳模型
            const bestModel = data.best_model;
            document.getElementById('bestModelName').textContent = bestModel.name;
            document.getElementById('bestModelScore').textContent = bestModel.score.toFixed(3);
            document.getElementById('bestModelScore').className = getScoreClass(bestModel.score);
            
            // 更新模型数量
            document.getElementById('modelCount').textContent = data.models.length + '个模型';
            
            // 更新指标
            document.getElementById('avgSuccessRate').textContent = data.metrics.avg_success_rate + '%';
            document.getElementById('successRateBar').style.width = data.metrics.avg_success_rate + '%';
            
            document.getElementById('avgResponseTime').textContent = data.metrics.avg_response_time + 'ms';
            document.getElementById('responseTrend').textContent = data.metrics.response_trend;
            document.getElementById('responseTrendIcon').className = getTrendIconClass(data.metrics.response_trend);
            
            document.getElementById('systemAvailability').textContent = data.metrics.system_availability + '%';
            document.getElementById('uptimeStatus').textContent = data.metrics.
