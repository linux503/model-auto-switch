<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 诊断工具</title>
    <style>
        body { font-family: monospace; background: #0f172a; color: #e2e8f0; margin: 20px; }
        .section { background: #1e293b; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
        button:hover { background: #2563eb; }
        pre { background: #0f172a; padding: 15px; border-radius: 6px; overflow: auto; }
    </style>
</head>
<body>
    <h1>🔍 OpenClaw 管理后台诊断</h1>
    
    <div class="section">
        <h2>1. 基础检查</h2>
        <button onclick="checkBasics()">运行基础检查</button>
        <div id="basicsResult"></div>
    </div>
    
    <div class="section">
        <h2>2. JavaScript 加载检查</h2>
        <button onclick="checkJS()">检查JS加载</button>
        <div id="jsResult"></div>
    </div>
    
    <div class="section">
        <h2>3. 数据加载测试</h2>
        <button onclick="loadData()">加载模型数据</button>
        <div id="dataResult"></div>
    </div>
    
    <div class="section">
        <h2>4. DOM 元素检查</h2>
        <button onclick="checkDOM()">检查DOM元素</button>
        <div id="domResult"></div>
    </div>
    
    <div class="section">
        <h2>5. 控制台错误模拟</h2>
        <button onclick="simulateErrors()">模拟常见错误</button>
        <div id="errorResult"></div>
    </div>
    
    <script>
        async function checkBasics() {
            const result = document.getElementById('basicsResult');
            result.innerHTML = '<div class="warning">检查中...</div>';
            
            let html = '';
            
            // 检查API
            try {
                const healthRes = await fetch('/api/health');
                const healthData = await healthRes.json();
                html += `<div class="${healthRes.ok ? 'success' : 'error'}">✅ 健康检查: ${healthRes.status} - ${healthData.status}</div>`;
            } catch (e) {
                html += `<div class="error">❌ 健康检查失败: ${e.message}</div>`;
            }
            
            // 检查模型API
            try {
                const modelsRes = await fetch('/api/models');
                const modelsData = await modelsRes.json();
                html += `<div class="${modelsRes.ok ? 'success' : 'error'}">✅ 模型API: ${modelsRes.status} - ${modelsData.count}个模型</div>`;
            } catch (e) {
                html += `<div class="error">❌ 模型API失败: ${e.message}</div>`;
            }
            
            // 检查页面
            try {
                const pageRes = await fetch('/admin');
                html += `<div class="${pageRes.ok ? 'success' : 'error'}">✅ 管理页面: ${pageRes.status} - ${pageRes.ok ? '可访问' : '不可访问'}</div>`;
            } catch (e) {
                html += `<div class="error">❌ 页面检查失败: ${e.message}</div>`;
            }
            
            result.innerHTML = html;
        }
        
        function checkJS() {
            const result = document.getElementById('jsResult');
            result.innerHTML = '<div class="warning">检查JavaScript加载...</div>';
            
            let html = '';
            
            // 检查关键脚本
            const scripts = [
                'socket.io-client',
                'bootstrap',
                'chart.js',
                'admin_complete.js'
            ];
            
            scripts.forEach(script => {
                const elements = document.querySelectorAll(`script[src*="${script}"]`);
                if (elements.length > 0) {
                    html += `<div class="success">✅ ${script}: 已加载</div>`;
                } else {
                    html += `<div class="error">❌ ${script}: 未找到</div>`;
                }
            });
            
            // 检查全局变量
            if (typeof io !== 'undefined') {
                html += `<div class="success">✅ socket.io: 全局变量可用</div>`;
            } else {
                html += `<div class="error">❌ socket.io: 全局变量不可用</div>`;
            }
            
            if (typeof bootstrap !== 'undefined') {
                html += `<div class="success">✅ bootstrap: 全局变量可用</div>`;
            } else {
                html += `<div class="error">❌ bootstrap: 全局变量不可用</div>`;
            }
            
            result.innerHTML = html;
        }
        
        async function loadData() {
            const result = document.getElementById('dataResult');
            result.innerHTML = '<div class="warning">加载数据中...</div>';
            
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                
                let html = `<div class="success">✅ 数据加载成功 (${response.status})</div>`;
                html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                // 检查关键字段
                if (!data.models || data.models.length === 0) {
                    html += `<div class="error">❌ 问题: models数组为空</div>`;
                } else {
                    html += `<div class="success">✅ models数组有${data.models.length}个元素</div>`;
                }
                
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div class="error">❌ 数据加载失败: ${error.message}</div>`;
            }
        }
        
        function checkDOM() {
            const result = document.getElementById('domResult');
            result.innerHTML = '<div class="warning">检查DOM元素...</div>';
            
            let html = '';
            const elements = [
                'totalModels', 'activeModels', 'currentModel', 'successRate',
                'modelsTableBody', 'connectionStatus', 'realtimeStatus'
            ];
            
            elements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    html += `<div class="success">✅ ${id}: 存在 (${element.tagName})</div>`;
                } else {
                    html += `<div class="error">❌ ${id}: 不存在</div>`;
                }
            });
            
            result.innerHTML = html;
        }
        
        function simulateErrors() {
            const result = document.getElementById('errorResult');
            result.innerHTML = '<div class="warning">模拟常见错误...</div>';
            
            let html = '<h3>常见问题诊断:</h3>';
            
            // 模拟1: JavaScript执行错误
            try {
                // 尝试执行一些可能出错的代码
                const test = undefinedVariable;
                html += `<div class="error">❌ 未捕获的引用错误</div>`;
            } catch (e) {
                html += `<div class="success">✅ 错误处理正常: ${e.name}</div>`;
            }
            
            // 模拟2: API调用
            try {
                fetch('/api/nonexistent').then(r => r.json());
                html += `<div class="warning">⚠️ 异步API调用中...</div>`;
            } catch (e) {
                html += `<div class="error">❌ API调用错误: ${e.message}</div>`;
            }
            
            // 检查控制台
            html += `<div class="warning">⚠️ 请按F12打开开发者工具查看控制台错误</div>`;
            html += `<div class="warning">⚠️ 常见问题: CORS错误、JavaScript语法错误、网络错误</div>`;
            
            result.innerHTML = html;
            
            // 触发一些控制台日志
            console.log('🔍 诊断工具: 检查控制台输出');
            console.warn('⚠️ 警告: 模拟警告信息');
            console.error('❌ 错误: 模拟错误信息');
        }
        
        // 页面加载时自动运行基础检查
        window.addEventListener('load', () => {
            checkBasics();
            setTimeout(checkJS, 500);
            setTimeout(checkDOM, 1000);
        });
    </script>
</body>
</html>
