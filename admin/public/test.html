<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 管理后台测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
        .test-section {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }
        .test-button {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        .result {
            background: rgba(15, 23, 42, 0.8);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid rgba(100, 116, 139, 0.3);
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .status-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .status-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 OpenClaw 管理后台功能测试</h1>
            <p>验证各个组件是否正常工作</p>
        </div>
        
        <div class="test-section">
            <h2>1. API 接口测试</h2>
            <button class="test-button" onclick="testApi('health')">测试健康检查</button>
            <button class="test-button" onclick="testApi('models')">测试模型列表</button>
            <button class="test-button" onclick="testApi('system/info')">测试系统信息</button>
            <div id="apiResult" class="result">点击按钮测试API...</div>
        </div>
        
        <div class="test-section">
            <h2>2. WebSocket 连接测试</h2>
            <button class="test-button" onclick="testWebSocket()">测试WebSocket连接</button>
            <div id="wsStatus" class="status">未连接</div>
            <div id="wsResult" class="result">等待WebSocket连接...</div>
        </div>
        
        <div class="test-section">
            <h2>3. 页面功能测试</h2>
            <button class="test-button" onclick="window.open('/admin', '_blank')">打开管理后台</button>
            <button class="test-button" onclick="testPageLoad()">测试页面加载</button>
            <div id="pageResult" class="result">等待测试...</div>
        </div>
        
        <div class="test-section">
            <h2>4. 服务器状态</h2>
            <div id="serverStatus">
                <p>服务器地址: <code>http://localhost:8191</code></p>
                <p>管理后台: <code>http://localhost:8191/admin</code></p>
                <p>API地址: <code>http://localhost:8191/api</code></p>
                <p>WebSocket: <code>ws://localhost:8191</code></p>
            </div>
        </div>
    </div>
    
    <script>
        // API测试函数
        async function testApi(endpoint) {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.textContent = `正在测试 /api/${endpoint}...`;
            
            try {
                const response = await fetch(`/api/${endpoint}`);
                const data = await response.json();
                
                resultDiv.textContent = `✅ API测试成功 (${response.status})\n\n` + 
                    JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = `❌ API测试失败\n\n错误: ${error.message}`;
            }
        }
        
        // WebSocket测试
        let socket = null;
        let wsMessages = [];
        
        function testWebSocket() {
            const wsStatus = document.getElementById('wsStatus');
            const wsResult = document.getElementById('wsResult');
            
            if (socket && socket.connected) {
                wsResult.textContent = 'WebSocket已连接，正在断开...';
                socket.disconnect();
                socket = null;
                wsStatus.textContent = '未连接';
                wsStatus.className = 'status';
                return;
            }
            
            wsResult.textContent = '正在连接WebSocket...';
            
            try {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}`;
                
                socket = io(wsUrl, {
                    transports: ['websocket', 'polling'],
                    reconnection: false
                });
                
                socket.on('connect', () => {
                    wsStatus.textContent = '已连接';
                    wsStatus.className = 'status status-success';
                    wsResult.textContent = '✅ WebSocket连接成功!\n等待接收数据...';
                    
                    // 请求系统状态
                    socket.emit('request-system-status');
                });
                
                socket.on('disconnect', () => {
                    wsStatus.textContent = '已断开';
                    wsStatus.className = 'status status-warning';
                    wsResult.textContent += '\n\n🔌 WebSocket连接已断开';
                });
                
                socket.on('connect_error', (error) => {
                    wsStatus.textContent = '连接错误';
                    wsStatus.className = 'status status-error';
                    wsResult.textContent = `❌ WebSocket连接失败: ${error.message}`;
                });
                
                socket.on('welcome', (data) => {
                    wsResult.textContent += `\n\n📨 收到欢迎消息: ${JSON.stringify(data, null, 2)}`;
                });
                
                socket.on('system-status', (data) => {
                    wsResult.textContent += `\n\n📊 收到系统状态: ${JSON.stringify(data, null, 2)}`;
                });
                
                socket.on('error', (data) => {
                    wsResult.textContent += `\n\n❌ 收到错误: ${JSON.stringify(data, null, 2)}`;
                });
                
            } catch (error) {
                wsStatus.textContent = '初始化失败';
                wsStatus.className = 'status status-error';
                wsResult.textContent = `❌ WebSocket初始化失败: ${error.message}`;
            }
        }
        
        // 页面加载测试
        async function testPageLoad() {
            const resultDiv = document.getElementById('pageResult');
            resultDiv.textContent = '正在测试页面加载...';
            
            try {
                const response = await fetch('/admin');
                if (response.ok) {
                    const html = await response.text();
                    
                    // 检查关键元素
                    const hasTitle = html.includes('OpenClaw 模型管理后台');
                    const hasScripts = html.includes('admin_complete.js') && html.includes('socket.io');
                    const hasStats = html.includes('totalModels') && html.includes('activeModels');
                    
                    resultDiv.textContent = `✅ 页面加载成功 (${response.status})\n\n` +
                        `标题存在: ${hasTitle ? '✅' : '❌'}\n` +
                        `脚本加载: ${hasScripts ? '✅' : '❌'}\n` +
                        `统计元素: ${hasStats ? '✅' : '❌'}\n\n` +
                        `页面大小: ${html.length} 字节`;
                } else {
                    resultDiv.textContent = `❌ 页面加载失败: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                resultDiv.textContent = `❌ 页面加载异常: ${error.message}`;
            }
        }
        
        // 页面加载时自动测试API
        window.addEventListener('load', () => {
            testApi('health');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
</body>
</html>
