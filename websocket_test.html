<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 连接测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
        }
        
        .container {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
        }
        
        h1 {
            color: #60a5fa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .status-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #3b82f6;
        }
        
        .status-card.success {
            border-left-color: #10b981;
        }
        
        .status-card.error {
            border-left-color: #ef4444;
        }
        
        .status-card.warning {
            border-left-color: #f59e0b;
        }
        
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .status-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #f1f5f9;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        
        .status-indicator.connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .status-indicator.disconnected {
            background-color: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        
        .status-indicator.connecting {
            background-color: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .log-container {
            background: #0f172a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            border: 1px solid #334155;
        }
        
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #94a3b8;
            font-size: 0.8em;
            margin-right: 10px;
        }
        
        .log-message {
            color: #f1f5f9;
        }
        
        .log-message.success {
            color: #34d399;
        }
        
        .log-message.error {
            color: #f87171;
        }
        
        .log-message.warning {
            color: #fbbf24;
        }
        
        .log-message.info {
            color: #60a5fa;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        button.success {
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
        }
        
        button.warning {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #60a5fa;
            margin: 10px 0;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WebSocket 连接测试</h1>
        
        <div class="status-card" id="connectionStatus">
            <div class="status-header">
                <div>
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span class="status-title">连接状态</span>
                </div>
                <span id="connectionState">未连接</span>
            </div>
            <div id="statusDetails">等待连接...</div>
        </div>
        
        <div class="controls">
            <button id="connectBtn" onclick="connectWebSocket()">连接 WebSocket</button>
            <button id="disconnectBtn" onclick="disconnectWebSocket()" disabled>断开连接</button>
            <button id="testBtn" onclick="sendTestMessage()" disabled>发送测试消息</button>
            <button id="statusBtn" onclick="requestSystemStatus()" disabled>请求系统状态</button>
            <button id="modelsBtn" onclick="requestModelsData()" disabled>请求模型数据</button>
            <button id="clearBtn" onclick="clearLogs()">清空日志</button>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">连接状态</div>
                <div class="stat-value" id="statState">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">消息接收</div>
                <div class="stat-value" id="statMessages">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">连接时间</div>
                <div class="stat-value" id="statUptime">0s</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最后活动</div>
                <div class="stat-value" id="statLastActivity">--</div>
            </div>
        </div>
        
        <div class="log-container" id="logContainer">
            <div class="log-entry">
                <span class="log-time">[等待连接]</span>
                <span class="log-message info">WebSocket 测试页面已加载</span>
            </div>
        </div>
    </div>

    <script>
        // WebSocket 连接状态
        let socket = null;
        let connectionStartTime = null;
        let messageCount = 0;
        let lastActivityTime = null;
        
        // 更新连接状态显示
        function updateConnectionStatus(state, details = '') {
            const statusElement = document.getElementById('connectionState');
            const detailsElement = document.getElementById('statusDetails');
            const indicator = document.getElementById('statusIndicator');
            const statusCard = document.getElementById('connectionStatus');
            
            statusElement.textContent = state;
            detailsElement.textContent = details;
            
            // 更新状态卡片样式
            statusCard.className = 'status-card';
            
            switch(state) {
                case '已连接':
                    indicator.className = 'status-indicator connected';
                    statusCard.classList.add('success');
                    break;
                case '连接中':
                    indicator.className = 'status-indicator connecting';
                    statusCard.classList.add('warning');
                    break;
                case '已断开':
                    indicator.className = 'status-indicator disconnected';
                    statusCard.classList.add('error');
                    break;
                default:
                    indicator.className = 'status-indicator';
            }
            
            // 更新统计
            document.getElementById('statState').textContent = state;
        }
        
        // 添加日志
        function addLog(type, message) {
            const logContainer = document.getElementById('logContainer');
            const now = new Date();
            const timeStr = `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            logEntry.innerHTML = `
                <span class="log-time">${timeStr}</span>
                <span class="log-message ${type}">${message}</span>
            `;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // 更新最后活动时间
            lastActivityTime = now;
            updateLastActivity();
        }
        
        // 更新统计信息
        function updateStats() {
            // 更新消息计数
            document.getElementById('statMessages').textContent = messageCount;
            
            // 更新运行时间
            if (connectionStartTime && socket && socket.readyState === WebSocket.OPEN) {
                const uptime = Math.floor((Date.now() - connectionStartTime) / 1000);
                document.getElementById('statUptime').textContent = `${uptime}s`;
            }
        }
        
        // 更新最后活动时间
        function updateLastActivity() {
            if (lastActivityTime) {
                const now = new Date();
                const diff = Math.floor((now - lastActivityTime) / 1000);
                document.getElementById('statLastActivity').textContent = `${diff}s前`;
            }
        }
        
        // 连接 WebSocket
        function connectWebSocket() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                addLog('warning', 'WebSocket 已经连接');
                return;
            }
            
            updateConnectionStatus('连接中', '正在连接到 ws://localhost:8191...');
            addLog('info', '正在连接 WebSocket...');
            
            try {
                socket = new WebSocket('ws://localhost:8191');
                connectionStartTime = Date.now();
                
                socket.onopen = function(event) {
                    updateConnectionStatus('已连接', '连接成功，可以发送和接收消息');
                    addLog('success', '✅ WebSocket 连接成功');
                    
                    // 启用按钮
                    document.getElementById('disconnectBtn').disabled = false;
                    document.getElementById('testBtn').disabled = false;
                    document.getElementById('statusBtn').disabled = false;
                    document.getElementById('modelsBtn').disabled = false;
                    document.getElementById('connectBtn').disabled = true;
                    
                    // 开始更新统计
                    setInterval(updateStats, 1000);
                };
                
                socket.onmessage = function(event) {
                    messageCount++;
                    lastActivityTime = new Date();
                    
                    try {
                        const data = JSON.parse(event.data);
                        addLog('info', `📥 收到消息: ${data.type || '未知类型'}`);
                        
                        // 特殊处理某些消息类型
                        if (data.type === 'welcome') {
                            addLog('success', `👋 ${data.message}`);
                        } else if (data.type === 'system-status') {
                            addLog('info', `📊 系统状态更新`);
                        } else if (data.type === 'models-data') {
                            addLog('info', `🤖 模型数据更新 (${data.count || 0} 个模型)`);
                        }
                    } catch (error) {
                        addLog('warning', `📥 收到消息: ${event.data.substring(0, 100)}...`);
                    }
                    
                    updateStats();
                };
                
                socket.onerror = function(error) {
                    updateConnectionStatus('已断开', '连接发生错误');
                    addLog('error', `❌ WebSocket 错误: ${error}`);
                    
                    // 禁用按钮
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('testBtn').disabled = true;
                    document.getElementById('statusBtn').disabled = true;
                    document.getElementById('modelsBtn').disabled = true;
                    document.getElementById('connectBtn').disabled = false;
                };
                
                socket.onclose = function(event) {
                    updateConnectionStatus('已断开', `连接已关闭 (代码: ${event.code})`);
                    addLog('warning', `🔌 WebSocket 连接关闭，代码: ${event.code}, 原因: ${event.reason || '未知'}`);
                    
                    // 禁用按钮
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('testBtn').disabled = true;
                    document.getElementById('statusBtn').disabled = true;
                    document.getElementById('modelsBtn').disabled = true;
                    document.getElementById('connectBtn').disabled = false;
                };
                
            } catch (error) {
                updateConnectionStatus('已断开', '连接失败');
                addLog('error', `❌ 连接异常: ${error}`);
            }
        }
        
        // 断开 WebSocket 连接
        function disconnectWebSocket() {
            if (socket) {
                socket.close(1000, '用户手动断开');
                addLog('info', '正在断开 WebSocket 连接...');
            }
        }
        
        // 发送测试消息
        function sendTestMessage() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addLog('error', 'WebSocket 未连接，无法发送消息');
                return;
            }
            
            const testMessage = {
                type: 'ping',
                timestamp: new Date().toISOString(),
                test: '这是测试消息'
            };
            
            socket.send(JSON.stringify(testMessage));
            addLog('info', `📤 发送测试消息: ${JSON.stringify(testMessage)}`);
        }
        
        // 请求系统状态
        function requestSystemStatus() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addLog('error', 'WebSocket 未连接，无法发送请求');
                return;
            }
            
            const request = {
                type: 'request-system-status'
            };
            
            socket.send(JSON.stringify(request));
            addLog('info', `📤 请求系统状态: ${JSON.stringify(request)}`);
        }
        
        // 请求模型数据
        function requestModelsData() {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addLog('error', 'WebSocket 未连接，无法发送请求');
                return;
            }
            
            const request = {
                type: 'request-models'
            };
            
            socket.send(JSON.stringify(request));
            addLog('info', `📤 请求模型数据: ${JSON.stringify(request)}`);
        }
        
        // 清空日志
        function clearLogs() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = `
                <div class="log-entry">
                    <span class="log-time">[日志已清空]</span>
                    <span class="log-message info">日志已清空，等待新消息...</span>
                </div>
            `;
            
            addLog('info', '日志已清空');
        }
        
        // 页面加载时初始化
        window.onload = function() {
            addLog('info', '页面加载完成，点击"连接 WebSocket"按钮开始测试');
            updateConnectionStatus('未连接', '点击"连接 WebSocket"按钮开始');
        };
        
        // 定期更新最后活动时间
        setInterval(updateLastActivity, 1000);
    </script>
</body>
</html>
